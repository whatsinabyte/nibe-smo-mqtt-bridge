<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480"
     font-family="system-ui,-apple-system,'Segoe UI',sans-serif">

  <!-- background -->
  <rect width="720" height="480" fill="#f9fafb" rx="12"/>

  <!-- ══ Column headers ══ -->
  <text x="130" y="28" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">FIRST FLIP</text>
  <text x="370" y="28" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">SUBSEQUENT FLIPS</text>
  <text x="610" y="28" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">FIRMWARE CHANGED</text>

  <!-- dividers -->
  <line x1="248" y1="16" x2="248" y2="464" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="492" y1="16" x2="492" y2="464" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ══ FIRST FLIP column ══ -->

  <!-- Step 1: User writes switch -->
  <rect x="30" y="44" width="200" height="52" rx="8"
        fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="130" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">User writes switch</text>
  <text x="130" y="82" text-anchor="middle" font-size="11" fill="#1e40af">Relationship unknown</text>

  <!-- arrow down -->
  <line x1="130" y1="96" x2="130" y2="116" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="126,112 130,120 134,112" fill="#6b7280"/>

  <!-- Step 2: 90s scan window -->
  <rect x="30" y="120" width="200" height="52" rx="8"
        fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">90 s scan window</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#5b21b6">Watching for new points</text>

  <!-- arrow down -->
  <line x1="130" y1="172" x2="130" y2="192" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="126,188 130,196 134,188" fill="#6b7280"/>

  <!-- Diamond: new points? -->
  <polygon points="130,196 185,228 130,260 75,228"
           fill="#fefce8" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="130" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">New points</text>
  <text x="130" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">appeared?</text>

  <!-- YES branch (down) -->
  <line x1="130" y1="260" x2="130" y2="280" stroke="#16a34a" stroke-width="1.2"/>
  <polygon points="126,276 130,284 134,276" fill="#16a34a"/>
  <text x="140" y="274" font-size="10" fill="#16a34a">yes</text>

  <!-- Step: record relationship -->
  <rect x="30" y="284" width="200" height="52" rx="8"
        fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="130" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Record relationship</text>
  <text x="130" y="322" text-anchor="middle" font-size="11" fill="#166534">Entities enabled · menu rebuilt</text>

  <!-- arrow down to learned -->
  <line x1="130" y1="336" x2="130" y2="356" stroke="#16a34a" stroke-width="1.2"/>
  <polygon points="126,352 130,360 134,352" fill="#16a34a"/>

  <!-- Learned state pill -->
  <rect x="60" y="360" width="140" height="36" rx="18"
        fill="#15803d"/>
  <text x="130" y="383" text-anchor="middle" font-size="12" font-weight="600" fill="white">Learned ✓</text>

  <!-- NO branch (right from diamond) -->
  <line x1="185" y1="228" x2="220" y2="228" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="192" y="222" font-size="10" fill="#9ca3af">no</text>

  <!-- non-controlling note -->
  <rect x="170" y="404" width="156" height="48" rx="8"
        fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="248" y="424" text-anchor="middle" font-size="11" fill="#6b7280">Recorded as</text>
  <text x="248" y="440" text-anchor="middle" font-size="11" fill="#6b7280">non-controlling</text>

  <!-- line from no branch down to non-controlling -->
  <line x1="220" y1="228" x2="248" y2="228" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="248" y1="228" x2="248" y2="404" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="244,400 248,408 252,400" fill="#9ca3af"/>

  <!-- ══ SUBSEQUENT FLIPS column ══ -->

  <!-- Case A: known controlling -->
  <rect x="268" y="44" width="204" height="52" rx="8"
        fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="370" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">User writes switch</text>
  <text x="370" y="80" text-anchor="middle" font-size="11" fill="#1e40af">Relationship already known</text>

  <!-- arrow down -->
  <line x1="370" y1="96" x2="370" y2="116" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="366,112 370,120 374,112" fill="#6b7280"/>

  <!-- Fast path box (replaced with scan window — fast-path single-point probing removed) -->
  <rect x="268" y="120" width="204" height="52" rx="8"
        fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="370" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">90 s scan window</text>
  <text x="370" y="158" text-anchor="middle" font-size="11" fill="#5b21b6">Bulk cache (~60s cycle)</text>

  <!-- arrow down -->
  <line x1="370" y1="172" x2="370" y2="192" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="366,188 370,196 374,188" fill="#6b7280"/>

  <!-- Entities appear/disappear -->
  <rect x="268" y="196" width="204" height="52" rx="8"
        fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="370" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Entities appear / disappear</text>
  <text x="370" y="234" text-anchor="middle" font-size="11" fill="#166534">Within ~60s bulk cycle</text>

  <!-- arrow down -->
  <line x1="370" y1="248" x2="370" y2="268" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="366,264 370,272 374,264" fill="#6b7280"/>

  <!-- Menu rebuilt + changelog -->
  <rect x="268" y="272" width="204" height="68" rx="8"
        fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5"/>
  <text x="370" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Menu dashboard rebuilt</text>
  <text x="370" y="312" text-anchor="middle" font-size="11" fill="#166534">Changelog entry added</text>
  <text x="370" y="328" text-anchor="middle" font-size="11" fill="#166534">Triggered by field set</text>

  <!-- timing label -->
  <rect x="288" y="360" width="164" height="36" rx="8"
        fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="370" y="380" text-anchor="middle" font-size="11" fill="#6b7280">⏱ up to ~60 s bulk cycle</text>
  <line x1="370" y1="340" x2="370" y2="360" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- ══ FIRMWARE CHANGED column ══ -->

  <rect x="508" y="44" width="200" height="52" rx="8"
        fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="608" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Firmware update</text>
  <text x="608" y="80" text-anchor="middle" font-size="11" fill="#9a3412">Relationship changed</text>

  <!-- arrow down -->
  <line x1="608" y1="96" x2="608" y2="116" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="604,112 608,120 612,112" fill="#6b7280"/>

  <!-- Detect change -->
  <rect x="508" y="120" width="200" height="52" rx="8"
        fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="608" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Change detected</text>
  <text x="608" y="158" text-anchor="middle" font-size="11" fill="#9a3412">On next switch flip</text>

  <!-- arrow down -->
  <line x1="608" y1="172" x2="608" y2="192" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="604,188 608,196 612,188" fill="#6b7280"/>

  <!-- Clear stale relationship -->
  <rect x="508" y="196" width="200" height="52" rx="8"
        fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="608" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#c2410c">Stale map cleared</text>
  <text x="608" y="234" text-anchor="middle" font-size="11" fill="#9a3412">firmware changed in Changelog</text>

  <!-- arrow down -->
  <line x1="608" y1="248" x2="608" y2="268" stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="604,264 608,272 612,264" fill="#6b7280"/>

  <!-- triggers new scan -->
  <rect x="508" y="272" width="200" height="52" rx="8"
        fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="608" y="294" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">New learning scan</text>
  <text x="608" y="310" text-anchor="middle" font-size="11" fill="#5b21b6">Back to first-flip path</text>

  <!-- arrow curving back left — simplified as an L -->
  <line x1="508" y1="298" x2="242" y2="298" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="246,294 238,298 246,302" fill="#a78bfa"/>

  <!-- ══ Legend ══ -->
  <rect x="24" y="448" width="672" height="24" rx="4" fill="none"/>

  <rect x="32"  y="456" width="14" height="10" rx="3" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
  <text x="52" y="465" font-size="10" fill="#6b7280">User action</text>

  <rect x="140" y="456" width="14" height="10" rx="3" fill="#faf5ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="160" y="465" font-size="10" fill="#6b7280">Bridge process</text>

  <rect x="268" y="456" width="14" height="10" rx="3" fill="#f0fdf4" stroke="#4ade80" stroke-width="1"/>
  <text x="288" y="465" font-size="10" fill="#6b7280">Outcome</text>

  <rect x="366" y="456" width="14" height="10" rx="3" fill="#fefce8" stroke="#fbbf24" stroke-width="1"/>
  <text x="386" y="465" font-size="10" fill="#6b7280">Decision</text>

  <rect x="454" y="456" width="14" height="10" rx="3" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="474" y="465" font-size="10" fill="#6b7280">Firmware event</text>

</svg>
