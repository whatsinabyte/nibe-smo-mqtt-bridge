<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340"
     font-family="system-ui,-apple-system,'Segoe UI',sans-serif">

  <!-- background -->
  <rect width="720" height="340" fill="#f9fafb" rx="12"/>

  <!-- ══ Top row nodes ══ -->

  <!-- Nibe controller -->
  <rect x="20" y="76" width="145" height="58" rx="8"
        fill="#fff1ee" stroke="#f87171" stroke-width="1.5"/>
  <text x="92" y="101" text-anchor="middle" font-size="13"
        font-weight="600" fill="#b91c1c">Nibe controller</text>
  <text x="92" y="119" text-anchor="middle" font-size="11"
        fill="#9b1e1e">Heat pump · HTTPS</text>

  <!-- Bridge -->
  <rect x="272" y="76" width="152" height="58" rx="8"
        fill="#faf5ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="348" y="101" text-anchor="middle" font-size="13"
        font-weight="600" fill="#6d28d9">Bridge</text>
  <text x="348" y="119" text-anchor="middle" font-size="11"
        fill="#5b21b6">HA add-on</text>

  <!-- MQTT broker -->
  <rect x="552" y="76" width="148" height="58" rx="8"
        fill="#f0fdf9" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="626" y="101" text-anchor="middle" font-size="13"
        font-weight="600" fill="#0f766e">MQTT broker</text>
  <text x="626" y="119" text-anchor="middle" font-size="11"
        fill="#115e59">Mosquitto</text>

  <!-- ══ Bottom row nodes ══ -->

  <!-- Entity Manager card -->
  <rect x="20" y="232" width="155" height="58" rx="8"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="97" y="257" text-anchor="middle" font-size="13"
        font-weight="600" fill="#92400e">Entity Manager</text>
  <text x="97" y="275" text-anchor="middle" font-size="11"
        fill="#78350f">Lovelace card</text>

  <!-- Home Assistant -->
  <rect x="272" y="232" width="152" height="58" rx="8"
        fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="348" y="257" text-anchor="middle" font-size="13"
        font-weight="600" fill="#1d4ed8">Home Assistant</text>
  <text x="348" y="275" text-anchor="middle" font-size="11"
        fill="#1e40af">Entities · dashboards</text>

  <!-- Menu dashboard -->
  <rect x="552" y="232" width="148" height="58" rx="8"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="626" y="257" text-anchor="middle" font-size="13"
        font-weight="600" fill="#92400e">Menu dashboard</text>
  <text x="626" y="275" text-anchor="middle" font-size="11"
        fill="#78350f">Nibe Menus</text>

  <!-- ══ Connections ══ -->

  <!-- Nibe ↔ Bridge: poll (solid) -->
  <line x1="165" y1="100" x2="272" y2="100"
        stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="268,96 276,100 268,104" fill="#6b7280"/>
  <text x="218" y="94" text-anchor="middle" font-size="10" fill="#9ca3af">poll</text>

  <!-- Nibe ↔ Bridge: write (dashed) -->
  <line x1="272" y1="112" x2="165" y2="112"
        stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="169,108 161,112 169,116" fill="#6b7280"/>
  <text x="218" y="126" text-anchor="middle" font-size="10" fill="#9ca3af">write</text>

  <!-- Bridge → MQTT: publish (solid) -->
  <line x1="424" y1="100" x2="552" y2="100"
        stroke="#0d9488" stroke-width="1.2"/>
  <polygon points="548,96 556,100 548,104" fill="#0d9488"/>
  <text x="488" y="94" text-anchor="middle" font-size="10" fill="#0d9488">publish</text>

  <!-- MQTT → Bridge: commands (dashed) -->
  <line x1="552" y1="112" x2="424" y2="112"
        stroke="#0d9488" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="428,108 420,112 428,116" fill="#0d9488"/>
  <text x="488" y="126" text-anchor="middle" font-size="10" fill="#0d9488">commands</text>

  <!-- Bridge ↓ HA: WS dashboard (solid) -->
  <line x1="348" y1="134" x2="348" y2="232"
        stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="344,228 348,236 352,228" fill="#6b7280"/>
  <text x="362" y="188" font-size="10" fill="#9ca3af">WS dashboard</text>

  <!-- MQTT → HA: auto-discovery (L-path, solid) -->
  <polyline points="626,134 626,196 424,196 424,232"
            fill="none" stroke="#0d9488" stroke-width="1.2"/>
  <polygon points="420,228 424,236 428,228" fill="#0d9488"/>
  <text x="530" y="191" text-anchor="middle" font-size="10"
        fill="#0d9488">auto-discovery · state</text>

  <!-- HA ↔ Entity Manager: subscribe (solid) -->
  <line x1="272" y1="256" x2="175" y2="256"
        stroke="#d97706" stroke-width="1.2"/>
  <polygon points="179,252 171,256 179,260" fill="#d97706"/>
  <text x="223" y="249" text-anchor="middle" font-size="10" fill="#d97706">subscribe</text>

  <!-- Entity Manager → HA: enable/disable (dashed) -->
  <line x1="175" y1="268" x2="272" y2="268"
        stroke="#d97706" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="268,264 276,268 268,272" fill="#d97706"/>
  <text x="223" y="282" text-anchor="middle" font-size="10" fill="#d97706">enable/disable</text>

  <!-- HA → Menu dashboard: Lovelace (solid) -->
  <line x1="424" y1="261" x2="552" y2="261"
        stroke="#d97706" stroke-width="1.2"/>
  <polygon points="548,257 556,261 548,265" fill="#d97706"/>
  <text x="488" y="254" text-anchor="middle" font-size="10" fill="#d97706">Lovelace</text>

  <!-- ══ Legend ══ -->
  <line x1="24"  y1="322" x2="52"  y2="322"
        stroke="#6b7280" stroke-width="1.2"/>
  <polygon points="48,318 56,322 48,326" fill="#6b7280"/>
  <text x="60" y="326" font-size="10" fill="#6b7280">HTTPS / WebSocket</text>

  <line x1="192" y1="322" x2="220" y2="322"
        stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="216,318 224,322 216,326" fill="#6b7280"/>
  <text x="228" y="326" font-size="10" fill="#9ca3af">response / external</text>

  <line x1="358" y1="322" x2="386" y2="322"
        stroke="#0d9488" stroke-width="1.2"/>
  <polygon points="382,318 390,322 382,326" fill="#0d9488"/>
  <text x="394" y="326" font-size="10" fill="#0d9488">MQTT</text>

  <line x1="444" y1="322" x2="472" y2="322"
        stroke="#d97706" stroke-width="1.2"/>
  <polygon points="468,318 476,322 468,326" fill="#d97706"/>
  <text x="480" y="326" font-size="10" fill="#d97706">Lovelace / card</text>

</svg>
