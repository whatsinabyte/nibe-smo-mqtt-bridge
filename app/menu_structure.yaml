    description: 'Settings for multi-unit installations where several heat pumps are connected together under one SMO S40
      controller.

      '
    submenus:
    - id: 7.3.1
      title: Configure
      description: 'Search for, activate, or deactivate connected heat pump units in a multi-installation. In systems with
        multiple outdoor units, each must have a unique address set via a DIP switch in the outdoor unit itself before it
        will be found here.

        '
      settings: []
      local_api: false
    - id: 7.3.2
      title: Installed heat pumps
      description: 'Overview and settings for each heat pump unit in the multi-installation.

        '
      submenus:
      - id: 7.3.2.1
        title: Heat pump settings
        description: 'Individual heat pump settings within the multi-installation. Each connected heat pump can have its own
          operating limits.

          '
        settings: []
        local_api: false
    - id: 7.3.3
      title: Name heat pump
      description: 'Assign a name to each heat pump unit in the multi-installation for identification on the display and in
        logs.

        '
      settings: []
      local_api: false
    - id: 7.3.4
      title: Docking
      description: 'Maps how each heat pump unit and component (compressor, diverter valve, hot water charging) is electrically
        connected and assigned within a multi-installation — not a simple online/offline sequence. The controller remembers
        a given docking layout and automatically re-applies it the next time the same configuration is detected.

        '
      settings: []
      local_api: false
    - id: 7.3.5
      title: Serial number
      description: 'Displays the serial number of each connected heat pump unit.

        '
      settings: []
      local_api: false
