        The code is required when deactivating the screen lock, changing the code, starting up the display after inactivity,
        and restarting/starting up SMO S40.

        '
      settings: []
      local_api: false
    - id: 7.5.9
      title: Modbus TCP/IP
      description: 'Modbus TCP/IP interface configuration for third-party integration. All Solar PV Modbus registers are configured
