  - id: '7.5'
    title: Tools
    description: 'Maintenance and service tools.

      '
    submenus:
    - id: 7.5.1
      title: Heat pump test
      description: 'Force-run individual heat pump components for testing. The most important safety functions remain active.

        '
      warning: 'Test mode is intended for troubleshooting only. Running components outside normal operating conditions can
        cause damage or reduced lifespan.

        '
      submenus:
      - id: 7.5.1.1
        title: Test mode
        description: 'Activate and configure individual component test mode.

          '
        settings:
        - label: Heat pump test — silent mode (EB101)
          range: off/on
          point_id: 22150
          note: Runs the heat pump in silent/low-noise test mode
        - label: Activate forced control
          range: off/on
          point_id: 3754
          warning: Forces components to run regardless of demand — only for troubleshooting
    - id: 7.5.2
      title: Underfloor drying function
      description: 'Automated underfloor heating drying programme for new installations. Runs the supply temperature through
        up to seven periods to cure screed before normal operation. Cross-reference: menu 1.30.6 Highest supply heat must
        be set to match the highest drying temperature — if the maximum supply limit is lower than the drying target, the
        drying programme will not reach the set temperature.

        '
      warning: 'Only use on newly installed underfloor heating. Running on an existing installation can damage floor coverings.
        Follow the floor manufacturer''s drying temperature profile.

        '
      tip: 'Factory drying profile (ramps up then back down to cure screed gradually): period 1 — 2 days at 20°C; period 2
        — 2 days at 30°C; period 3 — 2 days at 40°C; period 4 — 3 days at 45°C (peak); period 5 — 2 days at 40°C; period 6
        — 2 days at 30°C; period 7 — 2 days at 20°C. Adjust durations and temperatures below to match your floor manufacturer''s
        specific drying curve if it differs from this default ramp.

        '
      settings:
      - label: Floor drying activated
        range: off/on
        point_id: 3846
        tip: 'Start the floor drying program only on newly laid wet screed. The program runs automatically through all 7 periods.
          Ensure the system is not interrupted during the program.

          '
      - label: Period 1 duration
        range: 0 – 30 days
        point_id: 3853
        note: Sets the number of days the system runs at the temperature configured for period 1. Set to 0 to skip this period.
      - label: Period 1 temperature
        range: 15 – 70 °C
        point_id: 3860
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Period 2 duration
        range: 0 – 30 days
        point_id: 3852
        note: Sets the number of days the system runs at the temperature configured for period 2. Set to 0 to skip this period.
      - label: Period 2 temperature
        range: 15 – 70 °C
        point_id: 3859
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Period 3 duration
        range: 0 – 30 days
        point_id: 3851
        note: Sets the number of days the system runs at the temperature configured for period 3. Set to 0 to skip this period.
      - label: Period 3 temperature
        range: 15 – 70 °C
        point_id: 3858
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Period 4 duration
        range: 0 – 30 days
        point_id: 3850
        note: Peak period in the factory drying profile.
      - label: Period 4 temperature
        range: 15 – 70 °C
        point_id: 3857
        tip: Do not exceed the floor manufacturer's recommendation for your floor type. This is the highest temperature in
          the factory drying profile.
      - label: Period 5 duration
        range: 0 – 30 days
        point_id: 3849
        note: Sets the number of days the system runs at the temperature configured for period 5. Set to 0 to skip this period.
      - label: Period 5 temperature
        range: 15 – 70 °C
        point_id: 3856
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Period 6 duration
        range: 0 – 30 days
        point_id: 3848
        note: Sets the number of days the system runs at the temperature configured for period 6. Set to 0 to skip this period.
      - label: Period 6 temperature
        range: 15 – 70 °C
        point_id: 3855
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Period 7 duration
        range: 0 – 30 days
        point_id: 3847
        note: Sets the number of days the system runs at the temperature configured for period 7. Set to 0 to skip this period.
      - label: Period 7 temperature
        range: 15 – 70 °C
        point_id: 3854
        tip: Do not exceed the floor manufacturer's recommendation for your floor type.
      - label: Floor drying ongoing time (read-only)
        range: hours
        point_id: 3861
        note: Read-only counter showing how many days the underfloor drying programme has been running. Displayed only while
          the programme is active.
    - id: 7.5.3
      title: Forced control
      description: 'Force individual components to run for troubleshooting. Safety functions remain active.

        '
      warning: 'Forced control is intended for troubleshooting only. Using it in any other way may damage installation components.

        '
      note: 'Activate forced control via the setting in menu 7.5.1.1. Cross-reference: menu 7.5.1 Heat pump test.

        '
