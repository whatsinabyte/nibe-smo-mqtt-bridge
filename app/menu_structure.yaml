        on HTTPS port 8443. Requires firmware 4.10.5 or later.

        '
      local_api: false
      note: 'Local REST API enable/disable is configured on the controller display only.

        '
      settings: []
  - id: '7.6'
    title: Factory setting service
    description: 'Reset all settings including user settings to factory values. It is also possible to factory reset the connected
      heat pumps.

      '
    warning: 'When resetting, the start guide is displayed the next time SMO S40 restarts. All settings will be lost including
      installer settings. Use menu 4.30.4 if you only want to reset user settings.

      '
    settings: []
    local_api: false
  - id: '7.7'
    title: Start guide
    description: 'When SMO S40 is started for the first time the start guide is automatically activated. From this menu you
      can start it manually for reconfiguration during commissioning or after a factory reset.

      '
    settings: []
    local_api: false
  - id: '7.8'
    title: Quick start
    description: 'Quick start the compressors. One of the following demands must exist: heating, hot water, cooling, or pool
      (pool accessory required).

      '
    warning: 'Too many quick starts in a short space of time may damage the compressors and their auxiliary equipment.

      '
    settings: []
    local_api: false
  - id: '7.9'
    title: Logs
    description: 'System logs for diagnosing faults and reviewing historical events.

      '
    submenus:
    - id: 7.9.1
      title: Change log
      description: 'Read off previous changes to the control system here. The change log is saved at restart and remains unchanged
        after a factory reset.

        '
      note: 'The bridge maintains its own change log via MQTT (nibe/browser/changelog/history) which covers all changes made
        through both the controller display and HA. The controller display change log is separate and display-only.

        '
      settings: []
      local_api: false
    - id: 7.9.2
      title: Extended alarm log
      description: 'Detailed alarm log intended for troubleshooting. Contains extended diagnostic information for each alarm
        event.

        '
      settings: []
      local_api: false
    - id: 7.9.3
      title: Black box
      description: 'Export all logs (Change log, Extended alarm log) to a USB memory. Connect a USB memory and select the
        log(s) to export. Contains high-frequency data captured at the moment of an alarm — compressor speed, temperatures,
        pressures and other key parameters in the seconds before and after a fault.

        '
      settings: []
      local_api: false