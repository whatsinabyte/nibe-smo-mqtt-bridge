      - label: Available power (Solar PV)
        range: 0 – 65535
        point_id: 14314
        note: Read-only — the available PV power currently being reported to the SMO S40 via Modbus TCP from the Solar PV
          inverter. Any value written here will be overwritten within seconds.
    - id: 7.5.10
      title: Change pump model
      description: 'Select the model of circulation pump connected to the installation. SMO S40 uses the pump model to calculate
        the correct operating curve and speed control parameters. The standard charge pump for SMO S40 is the CPD 12-25/75
        (part no. 141 051).

        '
      settings: []
      local_api: false
    - id: 7.5.13
      title: Third-party integration
