name: "Nibe S-Series MQTT Bridge"
version: "1.0.0"
slug: "nibe_s_series"
description: "MQTT bridge for Nibe S-series heat pump controllers. Exposes all data points as native Home Assistant entities via MQTT auto-discovery."
url: "https://github.com/whatsinabyte/nibe-smo-mqtt-bridge"
stage: experimental
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
apparmor: true
backup: hot
homeassistant_api: true
hassio_api: true
services:
  - mqtt:want

options:
  nibe_host: "192.168.1.100"
  nibe_port: 8443
  nibe_username: ""
  nibe_password: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  device_name: "Nibe SMO S40"
  poll_interval: 30
  mode: "essential"
  log_level: "info"
  debug_mode: false
  api_failure_threshold: 3
  changelog_retention_days: 90
  remove_frontend: false
  nibe_ca_cert: ""
  mqtt_tls: false
  mqtt_ca_cert: ""

schema:
  # Nibe controller connection
  nibe_host: "match(^[a-zA-Z0-9]([a-zA-Z0-9\\-\\.]{0,61}[a-zA-Z0-9])?$)"
  nibe_port: port
  nibe_username: str
  nibe_password: password

  # MQTT broker connection
  mqtt_host: "match(^[a-zA-Z0-9]([a-zA-Z0-9\\-\\.]{0,61}[a-zA-Z0-9])?$)"
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?

  # Bridge behaviour
  device_name: str?
  poll_interval: list(15|30|60|120|300)?
  mode: list(essential|monitoring|advanced|menus|all|none)
  log_level: list(debug|info|warning|error)
  debug_mode: bool?
  api_failure_threshold: "int(1,100)?"
  changelog_retention_days: "int(1,3650)?"

  # Lifecycle
  remove_frontend: bool?

  # TLS — optional CA certificate paths for verifying self-signed certificates.
  # nibe_ca_cert: absolute path to a PEM CA cert for the Nibe device API.
  #   When set, full chain verification and hostname checking are enabled.
  #   Leave blank to accept the controller's self-signed cert (default).
  # mqtt_tls: set to true to encrypt broker traffic. Change mqtt_port to 8883.
  # mqtt_ca_cert: absolute path to a PEM CA cert for the MQTT broker.
  #   Only used when mqtt_tls is true. Leave blank to use the system CA store.
  nibe_ca_cert: str?
  mqtt_tls: bool?
  mqtt_ca_cert: str?

map:
  - config:rw

# Versions that require a manual update acknowledgement.
# Add a version here whenever a release changes the MQTT topic structure,
# renames or removes configuration options, or requires a clean reinstall.
# breaking_versions:
#   - "2.0.0"
